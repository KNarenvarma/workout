<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Train</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000; --card:#1C1C1E; --card2:#2C2C2E; --card3:#3A3A3C;
  --line:rgba(84,84,88,0.42);
  --txt:#fff; --dim:rgba(235,235,245,0.62); --faint:rgba(235,235,245,0.32);
  --acc:#FF375F; --acc-soft:rgba(255,55,95,0.14);
  --good:#30D158; --warn:#FFD60A; --bad:#FF453A; --slate:#98989D; --blue:#0A84FF;
  --spring:cubic-bezier(0.32,1.3,0.55,1);
  --r:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,Inter,'Segoe UI',Roboto,sans-serif;
  min-height:100dvh; overscroll-behavior-y:contain;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:8px}
svg{display:block}
::selection{background:var(--acc-soft)}

/* ── layout ── */
#screen{max-width:520px;margin:0 auto;padding:20px 18px calc(100px + env(safe-area-inset-bottom))}
.hd{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:4px 0 20px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--dim);margin-bottom:3px}
.h-title{font-size:33px;font-weight:800;letter-spacing:-0.022em;line-height:1.08}
.hd-chips{display:flex;gap:8px;flex-shrink:0;padding-bottom:4px}
.pill{display:inline-flex;align-items:center;gap:6px;min-height:40px;padding:0 13px;border-radius:999px;
  background:var(--card);font-size:13px;font-weight:600;color:var(--txt)}
.pill svg{color:var(--acc)}
.pill:active{transform:scale(0.96);background:var(--card2)}

/* ── cards ── */
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:12px}
.card.warnc{box-shadow:inset 3px 0 0 var(--bad)}
.card-t{font-size:16px;font-weight:700;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.card-t svg{color:var(--acc)}
.sub{font-size:13px;color:var(--dim);line-height:1.5;margin-top:3px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--acc);margin-bottom:5px}
.hero-label{font-size:28px;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
.hero-meta{font-size:13px;color:var(--dim);margin-top:6px}
.sect{font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--dim);margin:22px 4px 8px}

/* ── buttons ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:50px;
  border-radius:14px;font-size:15.5px;font-weight:600;background:var(--card2);
  transition:transform 0.12s ease,filter 0.12s ease;letter-spacing:-0.01em}
.btn:active{transform:scale(0.98);filter:brightness(1.2)}
.btn.acc{background:var(--acc);color:#fff}
.btn.ghost{background:transparent;color:var(--acc)}
.btn.danger{color:var(--bad);background:rgba(255,69,58,0.12)}
.btn.sm{min-height:44px;font-size:14px;border-radius:12px}
.btnrow{display:flex;gap:8px}
.btnrow .btn{flex:1}
.bbt{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:50px;border-radius:14px;
  font-size:15.5px;font-weight:600;background:var(--acc);color:#fff;letter-spacing:-0.01em}
.bbt:active{transform:scale(0.98)}
.bbt.ghost{background:var(--card2);color:var(--txt)}
.bbt.danger{background:rgba(255,69,58,0.12);color:var(--bad)}

/* ── status ── */
.c-done{color:var(--good)} .c-partial{color:var(--warn)} .c-missed{color:var(--bad)}
.c-skipped{color:var(--slate)} .c-rest{color:var(--faint)} .c-pushed{color:var(--acc)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;
  background:var(--card2);color:var(--dim)}
.chip.done{color:var(--good);background:rgba(48,209,88,0.14)}
.chip.partial{color:var(--warn);background:rgba(255,214,10,0.13)}
.chip.missed{color:var(--bad);background:rgba(255,69,58,0.14)}
.chip.skipped{color:var(--slate);background:rgba(152,152,157,0.16)}
.chip.pushed{color:var(--acc);background:var(--acc-soft)}
.chip.rest{color:var(--faint)}

/* ── week strip ── */
.weekstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
.ws-cell{display:flex;flex-direction:column;align-items:center;gap:7px;padding:11px 0;border-radius:16px;background:var(--card)}
.ws-cell.today{box-shadow:inset 0 0 0 1.5px var(--acc)}
.ws-d{font-size:11px;font-weight:600;color:var(--dim)}
.ws-dot{width:8px;height:8px;border-radius:50%;background:var(--card3)}
.ws-dot.done{background:var(--good)} .ws-dot.partial{background:var(--warn)}
.ws-dot.missed{background:var(--bad)} .ws-dot.skipped{background:var(--slate)}
.ws-dot.pushed{background:var(--acc)} .ws-dot.rest,.ws-dot.future,.ws-dot.none{background:var(--card3)}

/* ── exercise cards ── */
.exc{background:var(--card);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.exc-hd{display:flex;align-items:center;gap:12px;width:100%;padding:15px 17px;text-align:left;min-height:62px}
.exc-name{font-size:15.5px;font-weight:600;letter-spacing:-0.01em;line-height:1.25}
.exc-mus{font-size:12px;color:var(--dim);margin-top:3px}
.exc-meta{font-size:13px;font-weight:600;color:var(--dim);white-space:nowrap;font-variant-numeric:tabular-nums}
.exc-body{padding:2px 17px 17px}
.setrow{display:flex;gap:8px;margin:6px 0 12px;flex-wrap:wrap}
.set-chip{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:62px;min-height:56px;
  padding:7px 10px;border-radius:14px;background:var(--card2);flex:1;transition:transform 0.12s ease}
.set-chip:active{transform:scale(0.95)}
.set-chip .sc-n{font-size:10px;font-weight:600;letter-spacing:0.06em;color:var(--faint)}
.set-chip .sc-v{font-size:17px;font-weight:700;line-height:1.2;font-variant-numeric:tabular-nums;margin-top:2px}
.set-chip.done{background:rgba(48,209,88,0.14)}
.set-chip.done .sc-v{color:var(--good)}
.set-chip.pr{background:var(--acc-soft)}
.set-chip.pr .sc-v{color:var(--acc)}
.exq{display:flex;gap:8px;margin-top:2px}
.exq .btn{flex:1}
.steps{margin:14px 0 0;padding-left:18px;display:grid;gap:7px}
.steps li{font-size:13px;color:var(--dim);line-height:1.5}
.tipbox{display:flex;gap:9px;margin-top:12px;padding:12px 14px;border-radius:14px;background:var(--acc-soft);font-size:13px;line-height:1.5}
.tipbox svg{flex-shrink:0;color:var(--acc);margin-top:1px}
.altrow{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 0;border-bottom:0.5px solid var(--line);font-size:13.5px}
.altrow:last-child{border-bottom:none}
.altrow a{color:var(--acc);text-decoration:none;font-weight:600;font-size:12.5px;flex-shrink:0;min-height:44px;display:inline-flex;align-items:center}
.exnote{width:100%;margin-top:12px;padding:12px 14px;border-radius:14px;background:var(--card2);border:none;
  color:var(--txt);font-size:13.5px;font-family:inherit}
.exnote::placeholder{color:var(--faint)}

/* ── segmented (iOS) ── */
.seg{display:flex;background:var(--card);border-radius:12px;padding:3px;gap:2px;margin-bottom:14px;overflow-x:auto}
.seg-b{flex:1;min-height:38px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--dim);white-space:nowrap;padding:0 12px}
.seg-b.on{background:var(--card3);color:var(--txt)}

/* ── sheets ── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);z-index:60;
  opacity:0;pointer-events:none;transition:opacity 0.25s ease;display:flex;align-items:flex-end;justify-content:center}
.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;background:var(--card);
  border-radius:28px 28px 0 0;padding:10px 20px calc(26px + env(safe-area-inset-bottom));
  transform:translateY(30px);transition:transform 0.32s var(--spring)}
.sheet-bg.on .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:var(--card3);margin:6px auto 16px}
.sheet-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px}
.sheet-ovl{font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.sheet-t{font-size:20px;font-weight:800;letter-spacing:-0.02em}
.sheet-x{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;
  background:var(--card2);color:var(--dim);flex-shrink:0}

/* ── wheel pickers (iOS drum) ── */
.pickrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:4px 0 16px}
.pickrow.single{grid-template-columns:1fr}
.wheelwrap .step-lb{text-align:center;margin-bottom:8px}
.step-lb{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim)}
.wheelbox{position:relative;background:var(--card2);border-radius:16px;overflow:hidden}
.wheel{height:176px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;position:relative;z-index:1}
.wheel::-webkit-scrollbar{display:none}
.wheel-opt{height:44px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;
  font-size:21px;font-weight:600;color:var(--faint);font-variant-numeric:tabular-nums;transition:color 0.15s ease}
.wheel-opt.on{color:var(--txt);font-weight:700}
.wheel-pad{height:66px}
.wheel-hl{position:absolute;top:50%;left:8px;right:8px;height:44px;transform:translateY(-50%);
  border-radius:12px;background:rgba(255,255,255,0.07);pointer-events:none;z-index:0}
.wheelbox::before,.wheelbox::after{content:"";position:absolute;left:0;right:0;height:52px;z-index:2;pointer-events:none}
.wheelbox::before{top:0;background:linear-gradient(var(--card2),transparent)}
.wheelbox::after{bottom:0;background:linear-gradient(transparent,var(--card2))}
.lastline{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);margin-bottom:8px}
.lastline b{color:var(--txt);font-weight:600}
.lastline.alt{color:var(--faint)}
.lastline svg{flex-shrink:0}

/* ── inputs ── */
.lbl{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim);margin:14px 0 6px}
.inp{width:100%;min-height:48px;padding:0 14px;border-radius:14px;background:var(--card2);border:none;
  color:var(--txt);font-size:15px;font-family:inherit}
.inp[type="date"]{color-scheme:dark}
select.inp{appearance:none;-webkit-appearance:none}

/* ── timer pill ── */
.timer-pill{position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translate(-50%,-70px);
  display:flex;align-items:center;gap:8px;min-height:42px;padding:0 18px;border-radius:999px;z-index:70;
  background:rgba(28,28,30,0.92);backdrop-filter:blur(14px);box-shadow:0 10px 30px rgba(0,0,0,0.6);
  font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;transition:transform 0.35s var(--spring)}
.timer-pill.on{transform:translate(-50%,0)}
.timer-pill.warn{color:var(--warn)}
.timer-pill svg{color:var(--acc)}

/* ── toast ── */
.toast-zone{position:fixed;bottom:calc(106px + env(safe-area-inset-bottom));left:50%;z-index:80;width:0}
.toast{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;
  padding:12px 19px;border-radius:999px;background:rgba(44,44,46,0.95);backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.55);font-size:13.5px;font-weight:600;white-space:nowrap;
  animation:tin 0.32s var(--spring)}
.toast.accent{color:var(--acc)}
.toast svg{color:currentColor}
@keyframes tin{from{opacity:0;transform:translate(-50%,12px) scale(0.9)}to{opacity:1;transform:translate(-50%,0) scale(1)}}

/* ── tab bar ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;gap:2px;
  padding:7px 12px calc(7px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,0.8);backdrop-filter:blur(20px);border-top:0.5px solid var(--line)}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;max-width:110px;min-height:50px;
  justify-content:center;border-radius:14px;color:var(--faint);transition:color 0.15s ease}
.tb.on{color:var(--acc)}
.tb-lb{font-size:10px;font-weight:600;letter-spacing:0.01em}

/* ── stat tiles ── */
.stat-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stile{background:var(--card);border-radius:18px;padding:15px 13px}
.stile-v{font-size:26px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.stile-v small{font-size:14px;color:var(--dim);font-weight:600}
.stile-l{font-size:11px;font-weight:600;color:var(--dim);margin-top:6px}

/* ── heat strip ── */
.heat{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:12px}
.heat-cell{aspect-ratio:1;border-radius:7px;background:var(--card2)}
.heat-cell.done{background:rgba(48,209,88,0.6)}
.heat-cell.partial{background:rgba(255,214,10,0.45)}
.heat-cell.missed{background:rgba(255,69,58,0.42)}
.heat-cell.skipped{background:rgba(152,152,157,0.3)}
.heat-cell.today{outline:1.5px solid var(--acc);outline-offset:1px}
.heat-lg{display:flex;gap:12px;margin-top:12px;font-size:11px;color:var(--dim);flex-wrap:wrap}
.heat-lg span{display:inline-flex;align-items:center;gap:5px}
.heat-lg i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* ── charts / photos ── */
.chart-svg{width:100%;height:170px}
.chart-empty{display:flex;align-items:center;justify-content:center;height:110px;font-size:13px;color:var(--faint);text-align:center;padding:0 20px}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ph-th{position:relative;aspect-ratio:3/4;border-radius:14px;overflow:hidden;padding:0;background:var(--card2)}
.ph-th img{width:100%;height:100%;object-fit:cover;display:block}
.ph-th .ph-d{position:absolute;bottom:0;left:0;right:0;padding:16px 8px 7px;font-size:10px;font-weight:600;
  background:linear-gradient(transparent,rgba(0,0,0,0.75));text-align:left}
.ph-th.sel{outline:2.5px solid var(--acc);outline-offset:-2.5px}
.ph-full{width:100%;border-radius:18px;display:block}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cmp-grid img{width:100%;border-radius:16px;display:block}
.cmp-cap{text-align:center;font-size:11.5px;font-weight:600;color:var(--dim);margin-top:6px}

/* ── lists ── */
.li-row{display:flex;align-items:center;gap:12px;width:100%;min-height:54px;padding:6px 2px;text-align:left;
  border-bottom:0.5px solid var(--line);font-size:15px;font-weight:500}
.li-row:last-child{border-bottom:none}
.li-row svg{color:var(--acc);flex-shrink:0}
.li-row .sub{font-weight:400;margin-top:2px}
.li-x{margin-left:auto;color:var(--faint);display:flex;align-items:center;justify-content:center}

.ban-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.empty{padding:28px 16px;text-align:center;color:var(--faint);font-size:13px;line-height:1.6}
.divider{height:0.5px;background:var(--line);margin:16px 0}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important;scroll-behavior:auto !important}
}
</style>
</head>
<body>
<div id="timerPill" class="timer-pill" onclick="stopTimer()" role="timer" aria-label="Rest timer">
  <span id="timerTxt">0:00</span>
</div>
<main id="screen"></main>
<div id="sheetBg" class="sheet-bg" onclick="if(event.target===this)closeSheet()">
  <div id="sheet" class="sheet" role="dialog" aria-modal="true"></div>
</div>
<div id="toastZone" class="toast-zone" aria-live="polite"></div>
<input type="file" id="photoInput" accept="image/*" hidden>
<input type="file" id="importInput" accept="application/json,.json" hidden>
<nav class="tabbar" aria-label="Main">
  <button class="tb" id="tb-today" onclick="setTab('today')"><span class="tb-ic" data-ic="today"></span><span class="tb-lb">Today</span></button>
  <button class="tb" id="tb-train" onclick="setTab('train')"><span class="tb-ic" data-ic="train"></span><span class="tb-lb">Train</span></button>
  <button class="tb" id="tb-progress" onclick="setTab('progress')"><span class="tb-ic" data-ic="stats"></span><span class="tb-lb">Progress</span></button>
  <button class="tb" id="tb-more" onclick="setTab('more')"><span class="tb-ic" data-ic="more"></span><span class="tb-lb">More</span></button>
</nav>
<script>
const I = {
  today: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5"/><path d="M9.5 21v-5.5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V21"/></svg>',
  train: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="5" y="10.5" width="2" height="3"/><rect x="17" y="10.5" width="2" height="3"/><rect x="7" y="10.5" width="10" height="3" rx="0.5"/></svg>',
  fuel: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v7a3 3 0 0 1-6 0V2"/><line x1="5" y1="2" x2="5" y2="22"/><path d="M14 2h5a1 1 0 0 1 1 1v7a4 4 0 0 1-4 4h-1v8"/></svg>',
  body: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="4.5" r="2.5"/><path d="M12 7.5V14"/><path d="M8 10.5h8"/><path d="M8 21l4-7 4 7"/></svg>',
  stats: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15V12"/><path d="M12 15V8"/><path d="M17 15v-5"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  minus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5,12 10,17 19,7"/></svg>',
  chevDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 12,15 18,9"/></svg>',
  play: '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="7,4 20,12 7,20"/></svg>',

// ─── date helpers (local time, keys are YYYY-MM-DD) ───
function pad2(n){ return String(n).padStart(2, "0"); }
function dateKey(d){ return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()); }
function todayKey(){ return _todayOverride || dateKey(new Date()); }
function parseKey(k){ const [y,m,d] = k.split("-").map(Number); return new Date(y, m-1, d); }
function addDays(k, n){ const d = parseKey(k); d.setDate(d.getDate() + n); return dateKey(d); }
function weekdayIdx(k){ const d = parseKey(k).getDay(); return d === 0 ? 6 : d - 1; } // Mon=0
function fmtDate(k, opts){ return parseKey(k).toLocaleDateString("en-IN", opts || {day:"numeric", month:"short"}); }
function esc(s){ return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ─── persistence + migration ───
function applyState(d){
  if (!d || typeof d !== "object") return;
  PERSISTED.forEach(p => { if (d[p] !== undefined) S[p] = d[p]; });
  if (!Array.isArray(S.gyms) || !S.gyms.length) S.gyms = [{id:"g1", name:"My Gym"}];
  if (!S.gyms.some(g => g.id === S.currentGym)) S.currentGym = S.gyms[0].id;
  if (!S.days) S.days = {};
  if (!S.overrides) S.overrides = {};
}
function migrateV5(d){
  const out = {version: 6, gyms: [{id:"g1", name:"My Gym"}], currentGym: "g1",
    days: {}, overrides: {}, weights: d.weights || [], exNotes: d.notes || {}, photos: d.photos || []};
  for (const [date, byWo] of Object.entries(d.log || {})){
    const day = out.days[date] = out.days[date] || {sets: {}};
    for (const [wk, byEx] of Object.entries(byWo)){ day.sets[wk] = byEx; }
  }
  for (const date of Object.keys(d.skipped || {})){
    (out.days[date] = out.days[date] || {sets: {}}).status = "skipped";
  }
  return out; // meals / breakfast intentionally dropped
}
function loadStore(){
  try {
    const raw6 = localStorage.getItem(KEY_V6);
    if (raw6){ applyState(JSON.parse(raw6)); return; }
    const rawOld = localStorage.getItem(KEY_V5) || localStorage.getItem(KEY_V4);
    if (rawOld){ applyState(migrateV5(JSON.parse(rawOld))); persist(); }
  } catch(e){ console.error("load failed", e); }
}
function persist(){
  try {
    const out = {};
    PERSISTED.forEach(p => out[p] = S[p]);
    localStorage.setItem(KEY_V6, JSON.stringify(out));
  } catch(e){ console.error(e); if (typeof toast === "function") toast("Storage full — change not saved"); }
}

function gymName(id){ const g = S.gyms.find(g => g.id === id); return g ? g.name : "—"; }

// ─── scheduling engine ───
function dueList(k){
  const list = [];
  if (S.overrides[k]) list.push(S.overrides[k]);
  const sched = SCHED[weekdayIdx(k)].workout;
  if (sched !== "rest" && sched !== S.overrides[k]) list.push(sched);
  return list;
}
function ensureDay(k){
  if (!S.days[k]) S.days[k] = {sets: {}};
  if (!S.days[k].sets) S.days[k].sets = {};
  return S.days[k];
}
function setsFor(k, wk){ return S.days[k]?.sets?.[wk] || {}; }
function setsDoneCount(k, wk){
  const by = setsFor(k, wk); let n = 0;
  for (const ei in by) for (const si in by[ei]) if (by[ei][si]?.done) n++;
  return n;
}
function totalSets(wk){ return W[wk].exercises.reduce((a, e) => a + e.sets, 0); }
function anyTrainingLogged(k){
  const d = S.days[k]; if (!d || !d.sets) return false;
  return Object.keys(d.sets).some(wk => setsDoneCount(k, wk) > 0);
}
function firstActivity(){
  let min = null;
  for (const k of Object.keys(S.days)){
    const d = S.days[k];
    if ((d.status || anyTrainingLogged(k)) && (!min || k < min)) min = k;
  }
  for (const w of S.weights) if (!min || w.date < min) min = w.date;
  return min;
}
function dayStatus(k){
  const d = S.days[k];
  if (d && d.status) return {code: d.status, explicit: true};
  const t = todayKey();
  const fa = firstActivity();
  if (k < t && (!fa || k < fa)) return {code: "none", explicit: false}; // before the app's life began
  const due = dueList(k);
  if (!due.length){
    if (anyTrainingLogged(k)) return {code: "done", explicit: false}; // trained on a rest day
    return {code: k > t ? "future" : "rest", explicit: false};
  }
  let logged = 0, total = 0;
  for (const wk of due){ logged += setsDoneCount(k, wk); total += totalSets(wk); }
  if (total > 0 && logged >= total) return {code: "done", explicit: false};
  if (logged > 0) return {code: "partial", explicit: false};
  if (k > t) return {code: "future", explicit: false};
  if (k === t) return {code: "none", explicit: false};
  return {code: "missed", explicit: false};
}
function markDay(k, code){ ensureDay(k).status = code; persist(); }
function clearDayStatus(k){ if (S.days[k]) { delete S.days[k].status; persist(); } }

// unresolved missed workouts, last 3 days, newest first — silent when app has no history
function overdueItems(){
  if (!Object.keys(S.days).length && !S.weights.length) return [];
  const t = todayKey(), items = [];
  for (let i = 1; i <= 3; i++){
    const k = addDays(t, -i);
    const st = dayStatus(k);
    if (st.explicit || st.code !== "missed") continue;
    for (const wk of dueList(k)) if (setsDoneCount(k, wk) === 0) items.push({date: k, wk});
  }
  return items;
}
// place wk on first date >= startK without an override; returns date or null
function assignOverride(startK, wk){
  let k = startK;
  for (let i = 0; i < 7; i++){
    if (!S.overrides[k]) { S.overrides[k] = wk; return k; }
    k = addDays(k, 1);
  }
  return null;
}
function resolveOverdue(k, wk, action){
  if (action === "dotoday"){
    const at = assignOverride(todayKey(), wk);
    if (!at) return toast("No free slot this week");
    markDay(k, "pushed");
    toast(at === todayKey() ? "Moved to today" : "Moved to " + fmtDate(at));
  } else if (action === "push"){
    const at = assignOverride(addDays(todayKey(), 1), wk);
    if (!at) return toast("No free slot this week");
    markDay(k, "pushed");
    toast("Pushed to " + fmtDate(at, {weekday:"short", day:"numeric", month:"short"}));
  } else if (action === "missed"){ markDay(k, "missed"); toast("Marked missed"); }
  else if (action === "skipped"){ markDay(k, "skipped"); toast("Marked skipped"); }
  persist(); render();
}

// ─── history / PRs (gym-aware) ───
function sessionDates(wk, ei){
  return Object.keys(S.days).filter(k => {
    const e = S.days[k].sets?.[wk]?.[ei];
    return e && Object.values(e).some(s => s && s.done);
  }).sort().reverse();
}
function lastEntry(wk, ei, si, gymId){
  for (const k of sessionDates(wk, ei)){
    if (k === todayKey()) continue;
    if (gymId && dayGym(k) !== gymId) continue;
    const e = S.days[k].sets[wk][ei];
    const s = (si != null && e[si] && e[si].done) ? e[si] : Object.values(e).filter(x => x && x.done).pop();
    if (s) return {...s, date: k, gym: dayGym(k)};
  }
  return null;
}
function bestAt(wk, ei, gymId){
  let best = null;
  for (const k of Object.keys(S.days)){
    if (gymId && dayGym(k) !== gymId) continue;
    const e = S.days[k].sets?.[wk]?.[ei]; if (!e) continue;
    for (const s of Object.values(e)){
      if (s && s.done && (!best || s.w > best.w || (s.w === best.w && s.r > best.r))) best = {...s, date: k};
    }
  }
  return best;
}
function isPR(wk, ei, w, r, gymId){
  const b = bestAt(wk, ei, gymId);
  return b ? (w > b.w || (w === b.w && r > b.r)) : false;
}
function dayVolume(k){
  let v = 0; const d = S.days[k]; if (!d || !d.sets) return 0;
  for (const wk in d.sets) for (const ei in d.sets[wk]) for (const si in d.sets[wk][ei]){
    const s = d.sets[wk][ei][si]; if (s && s.done) v += (s.w || 0) * (s.r || 0);
  }
  return Math.round(v);
}

// PHOTOS — IndexedDB (unchanged store) + upload-with-date
// ═══════════════════════════════════════════════════════════════════════════
let _db = null;
function openDB(){
  return new Promise((res, rej) => {
    if (_db) return res(_db);
    const req = indexedDB.open(DB_NAME, 1);
    req.onerror = () => rej(req.error);
    req.onsuccess = () => { _db = req.result; res(_db); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("photos")) db.createObjectStore("photos", {keyPath: "id"});
    };
  });
}
async function savePhotoFull(id, dataURL){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("photos","readwrite");
    tx.objectStore("photos").put({id, data: dataURL});
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function getPhotoFull(id){
  const db = await openDB();
  return new Promise((res) => {
    const req = db.transaction("photos").objectStore("photos").get(id);
    req.onsuccess = () => res(req.result ? req.result.data : null);
    req.onerror = () => res(null);
  });
}
async function deletePhotoFull(id){
  const db = await openDB();
  return new Promise((res) => {
    const tx = db.transaction("photos","readwrite");
    tx.objectStore("photos").delete(id);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
}
function compressImage(file, maxW, q){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const w = img.width * scale, h = img.height * scale;
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        res(c.toDataURL("image/jpeg", q));
      };
      img.onerror = rej; img.src = e.target.result;
    };
    r.onerror = rej; r.readAsDataURL(file);
  });
}

// XLSX WRITER — dependency-free (ZIP stored entries + SpreadsheetML)
// ═══════════════════════════════════════════════════════════════════════════
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++){
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes){
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function buildZip(files){ // files: [{name, data: Uint8Array}]
  const chunks = [], central = [];
  let offset = 0;
  const d = new Date();
  const dosDate = ((d.getFullYear() - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate();
  const dosTime = (d.getHours() << 11) | (d.getMinutes() << 5);
  const enc = new TextEncoder();
  for (const f of files){
    const nameB = enc.encode(f.name);
    const crc = crc32(f.data);
    const lh = new Uint8Array(30 + nameB.length);
    const dv = new DataView(lh.buffer);
    dv.setUint32(0, 0x04034b50, true); dv.setUint16(4, 20, true); dv.setUint16(6, 0x0800, true);
    dv.setUint16(8, 0, true); dv.setUint16(10, dosTime, true); dv.setUint16(12, dosDate, true);
    dv.setUint32(14, crc, true); dv.setUint32(18, f.data.length, true); dv.setUint32(22, f.data.length, true);
    dv.setUint16(26, nameB.length, true); dv.setUint16(28, 0, true);
    lh.set(nameB, 30);
    chunks.push(lh, f.data);
    const ce = new Uint8Array(46 + nameB.length);
    const cv = new DataView(ce.buffer);
    cv.setUint32(0, 0x02014b50, true); cv.setUint16(4, 20, true); cv.setUint16(6, 20, true);
    cv.setUint16(8, 0x0800, true); cv.setUint16(10, 0, true);
    cv.setUint16(12, dosTime, true); cv.setUint16(14, dosDate, true);
    cv.setUint32(16, crc, true); cv.setUint32(20, f.data.length, true); cv.setUint32(24, f.data.length, true);
    cv.setUint16(28, nameB.length, true);
    cv.setUint32(42, offset, true);
    ce.set(nameB, 46);
    central.push(ce);
    offset += lh.length + f.data.length;
  }
  const cenSize = central.reduce((a, c) => a + c.length, 0);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, files.length, true); ev.setUint16(10, files.length, true);
  ev.setUint32(12, cenSize, true); ev.setUint32(16, offset, true);
  return new Blob([...chunks, ...central, eocd], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
}
function xmlEsc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function colRef(i){ let s = ""; i++; while (i > 0){ const m = (i - 1) % 26; s = String.fromCharCode(65 + m) + s; i = Math.floor((i - 1) / 26); } return s; }
function sheetXml(rows){
  let out = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  rows.forEach((row, ri) => {
    out += `<row r="${ri + 1}">`;
    row.forEach((v, ci) => {
      if (v == null || v === "") return;
      const ref = colRef(ci) + (ri + 1);
      if (typeof v === "number" && isFinite(v)) out += `<c r="${ref}"><v>${v}</v></c>`;
      else out += `<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${xmlEsc(v)}</t></is></c>`;
    });
    out += "</row>";
  });
  return out + "</sheetData></worksheet>";
}
function buildXlsx(sheets){ // sheets: [{name, rows: [[cell,...],...]}]
  const enc = new TextEncoder();
  const safe = n => n.replace(/[\[\]:*?\/\\]/g, " ").slice(0, 31);
  let ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
    '<Default Extension="xml" ContentType="application/xml"/>' +
    '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>';
  let wbSheets = "", wbRels = "";
  const files = [];
  sheets.forEach((s, i) => {
    const n = i + 1;
    ct += `<Override PartName="/xl/worksheets/sheet${n}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`;
    wbSheets += `<sheet name="${xmlEsc(safe(s.name))}" sheetId="${n}" r:id="rId${n}"/>`;
    wbRels += `<Relationship Id="rId${n}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${n}.xml"/>`;
    files.push({name: `xl/worksheets/sheet${n}.xml`, data: enc.encode(sheetXml(s.rows))});
  });
  ct += "</Types>";
  files.unshift(
    {name: "[Content_Types].xml", data: enc.encode(ct)},
    {name: "_rels/.rels", data: enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')},
    {name: "xl/workbook.xml", data: enc.encode(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${wbSheets}</sheets></workbook>`)},
    {name: "xl/_rels/workbook.xml.rels", data: enc.encode(`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${wbRels}</Relationships>`)}
  );
  return buildZip(files);
}
function downloadBlob(blob, filename){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1500);
}

function openSheet(contentHTML){
  const sheet = document.getElementById("sheet");
  sheet.innerHTML = `<div class="sheet-handle"></div>` + contentHTML;
  document.getElementById("sheetBg").classList.add("on");
}
function closeSheet(){ document.getElementById("sheetBg").classList.remove("on"); }

function toast(msg, variant, iconName){
  const zone = document.getElementById("toastZone");
  if (!zone) return;
  const t = document.createElement("div");
  t.className = "toast " + (variant || "");
  t.innerHTML = (iconName ? ic(iconName, 14) : '') + `<span>${msg}</span>`;
  zone.appendChild(t);
  setTimeout(() => {
    t.style.transition = "all 0.35s cubic-bezier(0.4, 0, 1, 1)";
    t.style.opacity = "0";
    t.style.transform = "translate(-50%, -14px) scale(0.92)";
  }, 2100);
  setTimeout(() => t.remove(), 2500);
}

let _timerInterval = null;
let _timerEnd = 0;
function startTimer(seconds){
  stopTimer();
  _timerEnd = Date.now() + seconds * 1000;
  document.getElementById("timerPill").classList.add("on");
  tickTimer();
  _timerInterval = setInterval(tickTimer, 500);
}
function tickTimer(){
  const pill = document.getElementById("timerPill");
  const txt = document.getElementById("timerTxt");
  const left = Math.max(0, Math.round((_timerEnd - Date.now()) / 1000));
  txt.textContent = Math.floor(left / 60) + ":" + (left % 60).toString().padStart(2, "0");
  if (left <= 10) pill.classList.add("warn");
  if (left === 0){
    if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
    stopTimer();
    toast("Rest complete — next set", "accent", "check");
  }
}
function stopTimer(){
  if (_timerInterval) clearInterval(_timerInterval);
  _timerInterval = null;
  const pill = document.getElementById("timerPill");
  pill.classList.remove("on", "warn");
}

function simpleRing(pct, color, size){
  const s = size || 44; const r = (s/2) - 3.5; const c = 2*Math.PI*r;
  return `<svg width="${s}" height="${s}" style="transform:rotate(-90deg);flex-shrink:0" aria-hidden="true">
    <circle cx="${s/2}" cy="${s/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
    <circle cx="${s/2}" cy="${s/2}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-Math.min(pct,100)/100)}"
      stroke-linecap="round" style="transition:stroke-dashoffset 0.7s var(--spring)"/>
  </svg>`;
}

function lineChart(data, color){
  color = color || '#FF375F';
  const w = 320, h = 150, pad = {t: 14, r: 10, b: 20, l: 34};
  if (!data || data.length < 2) return `<div class="chart-empty">Log at least 2 data points to see the trend.</div>`;
  const ys = data.map(d => d.v);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rY = Math.max(maxY - minY, 0.5);
  const x = i => pad.l + (i / (data.length - 1)) * (w - pad.l - pad.r);
  const y = v => pad.t + (1 - (v - minY) / rY) * (h - pad.t - pad.b);
  let path = "";
  data.forEach((d, i) => { path += (i === 0 ? "M" : "L") + x(i).toFixed(1) + "," + y(d.v).toFixed(1); });
  const areaPath = path + `L${x(data.length-1)},${h-pad.b} L${x(0)},${h-pad.b} Z`;
  const gradId = "g" + Math.random().toString(36).slice(2,7);
  let gridLines = "";
  for (let i = 0; i < 4; i++){
    const gy = pad.t + (i / 3) * (h - pad.t - pad.b);
    const gv = maxY - (i / 3) * rY;
    gridLines += `<line x1="${pad.l}" y1="${gy}" x2="${w-pad.r}" y2="${gy}" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`;
    gridLines += `<text x="${pad.l-6}" y="${gy+3}" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="end" font-family="Inter" font-weight="500">${gv.toFixed(1)}</text>`;
  }
  let xLbls = "";
  const step = Math.max(1, Math.floor(data.length / 4));
  for (let i = 0; i < data.length; i += step){
    xLbls += `<text x="${x(i)}" y="${h-5}" font-size="9" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-family="Inter" font-weight="500">${data[i].label}</text>`;
  }
  let dots = "";
  data.forEach((d,i) => { dots += `<circle cx="${x(i).toFixed(1)}" cy="${y(d.v).toFixed(1)}" r="3" fill="${color}" stroke="#0B0C0E" stroke-width="1.5"/>`; });
  return `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" role="img">
    <defs><linearGradient id="${gradId}" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${gridLines}
    <path d="${areaPath}" fill="url(#${gradId})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLbls}
  </svg>`;
}

const STATUS_LABEL = {done:"done", partial:"partial", missed:"missed", skipped:"skipped", pushed:"pushed", rest:"rest", none:"", future:""};
function statusChip(code){
  const l = STATUS_LABEL[code];
  return l ? `<span class="chip ${code}">${l}</span>` : "";
}

function weekStrip(centerK){
  const mon = addDays(centerK, -weekdayIdx(centerK));
  let cells = "";
  for (let i = 0; i < 7; i++){
    const k = addDays(mon, i);
    const st = dayStatus(k).code;
    cells += `<div class="ws-cell${k === todayKey() ? ' today' : ''}" title="${fmtDate(k)}">
      <span class="ws-d">${SCHED[i].day[0]}</span><span class="ws-dot ${st}"></span></div>`;
  }
  return `<div class="weekstrip">${cells}</div>`;
}

// ─── iOS-style wheel pickers ───
function wheelHTML(id, label){
  return `<div class="wheelwrap"><div class="step-lb">${label}</div>
    <div class="wheelbox"><div class="wheel-hl"></div><div class="wheel" id="${id}"></div></div></div>`;
}
function initWheel(id, values, current, onChange){
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="wheel-pad"></div>` +
    values.map(v => `<div class="wheel-opt">${v}</div>`).join("") + `<div class="wheel-pad"></div>`;
  let idx = values.indexOf(current);
  if (idx < 0) idx = values.reduce((bi, v, i) => Math.abs(v - current) < Math.abs(values[bi] - current) ? i : bi, 0);
  const mark = (i) => { const kids = el.children; for (let j = 1; j < kids.length - 1; j++) kids[j].classList.toggle("on", j - 1 === i); };
  el.scrollTop = idx * 44;
  mark(idx);
  let last = idx;
  el.addEventListener("scroll", () => {
    const i = Math.max(0, Math.min(values.length - 1, Math.round(el.scrollTop / 44)));
    if (i !== last){
      last = i; mark(i);
      if (navigator.vibrate) navigator.vibrate(3);
      onChange(values[i]);
    }
  }, {passive: true});
}
function rangeVals(from, to, step){
  const out = [];
  for (let v = from; v <= to + 1e-9; v += step) out.push(Math.round(v * 10) / 10);
  return out;
}

function greeting(){
  const h = (_todayOverride ? 8 : new Date().getHours());
  if (h < 4) return "Late night lift?";
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  if (h < 21) return "Good evening";
  return "Night session";
}

function header(title, eyebrow){
  const wt = S.weights.length ? [...S.weights].sort((a,b) => a.date < b.date ? 1 : -1)[0] : null;
  return `<div class="hd">
    <div><div class="eyebrow">${eyebrow}</div><div class="h-title">${title}</div></div>
    <div class="hd-chips">
      <button class="pill" onclick="openGymSheet()" aria-label="Current gym">${ic('pin',15)}<span>${esc(gymName(S.currentGym))}</span></button>
      <button class="pill" onclick="openWeightSheet()" aria-label="Bodyweight">${ic('body',15)}<span>${wt ? wt.kg + 'kg' : '— kg'}</span></button>
    </div></div>`;
}

    <button class="li-row" onclick="pickGym('${g.id}')">${ic('pin',16)}

function pickGym(id){ S.currentGym = id; persist(); closeSheet(); render(); toast("Training at " + esc(gymName(id)), null, "pin"); }
function addGym(){
  const n = prompt("Gym name (e.g. Gold's Madhapur)");
  if (!n || !n.trim()) return;
  const id = "g_" + Date.now().toString(36);

// ─── bodyweight sheet ───
let _sheetWt = null;
function openWeightSheet(){
  const last = S.weights.length ? [...S.weights].sort((a,b) => a.date < b.date ? 1 : -1)[0] : null;
  const todays = S.weights.find(w => w.date === todayKey());
  _sheetWt = {kg: todays ? todays.kg : (last ? last.kg : 80.0)};
  renderWtSheet();
}
function renderWtSheet(){
  openSheet(`
    <div class="sheet-hd"><div><div class="sheet-ovl">${fmtDate(todayKey(),{weekday:"long",day:"numeric",month:"long"})}</div>
      <div class="sheet-t">Bodyweight</div></div>
      <button class="sheet-x" onclick="closeSheet()" aria-label="Close">${ic('x',12)}</button></div>

function saveWeight(){
  const tk = todayKey();
  S.weights = S.weights.filter(w => w.date !== tk);

// ═══════════════════════════════════════════════════════════════════════════
// TODAY TAB
// ═══════════════════════════════════════════════════════════════════════════
function renderToday(){
  const tk = todayKey();
  const st = dayStatus(tk);
  let h = header(greeting(), fmtDate(tk, {weekday:"long", day:"numeric", month:"long"}));
  h += weekStrip(tk);

  // most recent unresolved missed workout — one card, never a wall
  const od = overdueItems();
  if (od.length){
    h += overdueCard(od[0]);
    if (od.length > 1) h += `<div class="sub" style="margin:-4px 6px 12px">${od.length - 1} older missed session${od.length > 2 ? "s" : ""} kept in history.</div>`;
  }

  const due = dueList(tk);
  if (st.explicit && (st.code === "skipped" || st.code === "pushed" || st.code === "missed" || st.code === "rest")){
    h += resolvedTodayCard(st.code);
  } else if (due.length){
    for (const wk of due) h += todayWorkoutCard(wk);
  } else {
    h += restCard();
  }

  // bodyweight nudge — only when nothing logged for 3+ days
  const lastWt = S.weights.length ? [...S.weights].map(w => w.date).sort().pop() : null;
  if (!lastWt || lastWt < addDays(tk, -3)){
    h += `<button class="li-row" style="border-radius:18px;padding:8px 16px;background:var(--card);border-bottom:none"
      onclick="openWeightSheet()">${ic('body',18)}<span class="grow">Log your bodyweight</span><span class="li-x">${ic('plus',16)}</span></button>`;
  }
  return h;
}

function overdueCard(o){
  return `<div class="card">
    <div class="row">
      <div class="grow">
        <div class="card-t">${W[o.wk].label} not done</div>
        <div class="sub">Was due ${fmtDate(o.date,{weekday:"long", day:"numeric", month:"short"})} — what happened?</div>
      </div>
      ${statusChip("missed")}
    </div>
    <div class="ban-acts">
      <button class="btn sm acc" onclick="resolveOverdue('${o.date}','${o.wk}','dotoday')">Do it today</button>
      <button class="btn sm" onclick="resolveOverdue('${o.date}','${o.wk}','push')">${ic('push',14)} Push to tomorrow</button>
      <button class="btn sm ghost" onclick="resolveOverdue('${o.date}','${o.wk}','skipped')">I chose to skip</button>
      <button class="btn sm ghost" onclick="resolveOverdue('${o.date}','${o.wk}','missed')">Just missed it</button>
    </div>
  </div>`;
}

function todayWorkoutCard(wk){
  const tk = todayKey();
  const done = setsDoneCount(tk, wk), total = totalSets(wk);
  const pct = total ? Math.round(done / total * 100) : 0;
  const allDone = total > 0 && done >= total;
  const label = allDone ? "Session complete" : done === 0 ? "Start workout" : "Continue workout";
  const moved = S.overrides[tk] === wk && SCHED[weekdayIdx(tk)].workout !== wk;
  return `<div class="card" style="padding:22px 20px">
    <div class="row">
      <div class="grow">
        <div class="hero-eyebrow">Today${moved ? ' · moved here' : ''}</div>
        <div class="hero-label">${W[wk].label}</div>
        <div class="hero-meta">${W[wk].exercises.length} exercises · ${done ? `${done}/${total} sets · ${dayVolume(tk).toLocaleString("en-IN")} kg` : `${total} sets`}</div>
      </div>
      ${simpleRing(pct, "#FF375F", 64)}
    </div>
    <div style="margin-top:18px">
      <button class="btn acc" onclick="startWorkout('${wk}')">${ic(allDone ? 'check' : 'play',16)} ${label}</button>
      ${allDone ? "" : `<div class="btnrow" style="margin-top:6px">
        <button class="btn sm ghost" onclick="pushToday('${wk}')">Push to tomorrow</button>
        <button class="btn sm ghost" onclick="skipToday()">Skip</button>
      </div>`}
    </div>
  </div>`;
}

function restCard(){
  return `<div class="card">
    <div class="row">
      <div class="grow">
        <div class="hero-eyebrow" style="color:var(--dim)">Recovery</div>
        <div class="hero-label" style="color:var(--dim)">Rest day</div>
        <div class="hero-meta">Muscle grows while you rest. Walk, stretch, sleep well.</div>
      </div>
      ${ic('moon', 40)}
    </div>
    <button class="btn sm ghost" style="margin-top:14px" onclick="setTab('train')">Train anyway</button>
  </div>`;
}

function resolvedTodayCard(code){
  const msg = {
    skipped: "You chose to skip today. Tomorrow is a new bar.",
    pushed: "Today's workout was pushed forward.",
    missed: "Marked missed. It happens — get the next one.",
    rest: "Marked as rest day."
  }[code];
  return `<div class="card">
    <div class="row"><div class="grow"><div class="card-t">Today: ${statusChip(code)}</div>
      <div class="sub" style="margin-top:6px">${msg}</div></div></div>
    <button class="btn sm ghost" style="margin-top:12px" onclick="undoTodayStatus()">Undo</button>
  </div>`;
}

function startWorkout(wk){
  S.activeWO = wk;
  S.expandedEx = null;
  setTab("train");
}
function skipToday(){
  markDay(todayKey(), "skipped");
  render();
  toast("Skipped — see you tomorrow");
}
function pushToday(wk){
  const at = assignOverride(addDays(todayKey(), 1), wk);
  if (!at) return toast("No free day in the next week");
  markDay(todayKey(), "pushed");
  render();
  toast("Pushed to " + fmtDate(at, {weekday:"short", day:"numeric", month:"short"}));
}
function undoTodayStatus(){
  const tk = todayKey();
  const code = S.days[tk] && S.days[tk].status;
  if (code === "pushed"){
    // remove the override this push created (first future override matching today's scheduled workout)
    const schedWk = SCHED[weekdayIdx(tk)].workout;
    for (let i = 1; i <= 7; i++){
      const k = addDays(tk, i);
      if (S.overrides[k] === schedWk){ delete S.overrides[k]; break; }
    }
  }
  clearDayStatus(tk);
  render();
  toast("Undone", null, "refresh");
}

// ═══════════════════════════════════════════════════════════════════════════
// TRAIN TAB — execution + gym-aware logging

function renderTrain(){
  const wk = S.activeWO && W[S.activeWO] ? S.activeWO : "upper1";

    h += `<div class="card" style="padding:12px 16px"><div class="sub">${ic('info',14)} Today's plan is <b style="color:var(--txt)">${W[due[0]].label}</b>. Anything you log here still counts for today.</div></div>`;
  }

  h += `<div class="row" style="margin:2px 4px 12px">

// ─── set sheet ───
let _sheetSet = null;
function openSetSheet(wk, ei, si){
  const ex = W[wk].exercises[ei];
  const cur = setsFor(todayKey(), wk)[ei]?.[si];
  const last = lastEntry(wk, ei, si, S.currentGym);
  const lastAny = last || lastEntry(wk, ei, si, null);
  const w = cur ? cur.w : (lastAny ? lastAny.w : 10);
  const r = cur ? cur.r : (lastAny ? lastAny.r : (parseInt(ex.reps) || 8));
  _sheetSet = {wk, ei, si, w, r, existing: !!(cur && cur.done)};
  renderSetSheet();
}
function renderSetSheet(){
  const {wk, ei, si, w, r, existing} = _sheetSet;
  const ex = W[wk].exercises[ei];
  const last = lastEntry(wk, ei, si, S.currentGym);
  const lastOther = last ? null : lastEntry(wk, ei, si, null);
  openSheet(`
    <div class="sheet-hd"><div><div class="sheet-ovl">Set ${si+1} of ${ex.sets} · target ${ex.reps}</div>
      <div class="sheet-t">${ex.name}</div></div>
      <button class="sheet-x" onclick="closeSheet()" aria-label="Close">${ic('x',12)}</button></div>
    ${last ? `<div class="lastline">${ic('history',14)} Last here: <b>${last.w}kg × ${last.r}</b> · ${fmtDate(last.date)}</div>` : ""}
    ${lastOther ? `<div class="lastline alt">${ic('history',14)} Last at ${esc(gymName(lastOther.gym))}: <b>${lastOther.w}kg × ${lastOther.r}</b> · machines may differ</div>` : ""}
    <div class="pickrow">${wheelHTML("whW", "weight · kg")}${wheelHTML("whR", "reps")}</div>
    <div class="lastline" id="prLine" style="color:var(--acc);min-height:20px;visibility:hidden">${ic('trophy',14)}<span>New PR at this gym</span></div>
    <button class="bbt" onclick="saveSet()">${existing ? "Update set" : "Log set"}</button>
    ${existing ? `<button class="bbt danger" style="margin-top:8px" onclick="unlogSet()">Remove set</button>` : ""}
  `);
  const upPR = () => {
    const el = document.getElementById("prLine");
    if (el) el.style.visibility = isPR(wk, ei, _sheetSet.w, _sheetSet.r, S.currentGym) ? "visible" : "hidden";
  };
  initWheel("whW", rangeVals(0, 200, 0.5), w, v => { _sheetSet.w = v; upPR(); });
  initWheel("whR", rangeVals(1, 30, 1), r, v => { _sheetSet.r = v; upPR(); });
  upPR();
}
function saveSet(){
  if (!_sheetSet) return;
  const {wk, ei, si, w, r} = _sheetSet;
  const tk = todayKey();
  const day = ensureDay(tk);
  if (!day.gym) day.gym = S.currentGym;
  if (!day.sets[wk]) day.sets[wk] = {};
  if (!day.sets[wk][ei]) day.sets[wk][ei] = {};
  const pr = isPR(wk, ei, w, r, S.currentGym);
  day.sets[wk][ei][si] = {w, r, done: true, pr, ts: Date.now()};
  persist(); closeSheet(); render();
  const rest = W[wk].exercises[ei].rest;
  startTimer(rest);
  if (pr) toast(`New PR — ${w}kg × ${r}`, "accent", "trophy");
  else toast(`Set logged · rest ${Math.round(rest / 60 * 10) / 10} min`, null, "check");
}
function unlogSet(){
  if (!_sheetSet) return;
  const {wk, ei, si} = _sheetSet;
  const tk = todayKey();
  if (S.days[tk]?.sets?.[wk]?.[ei]?.[si]){ delete S.days[tk].sets[wk][ei][si]; persist(); }
  closeSheet(); render();
}

// one tap: log all remaining sets like the previous session
function sameAsLast(wk, ei){
  const ex = W[wk].exercises[ei];
  const tk = todayKey();
  const day = ensureDay(tk);
  if (!day.gym) day.gym = S.currentGym;
  if (!day.sets[wk]) day.sets[wk] = {};
  if (!day.sets[wk][ei]) day.sets[wk][ei] = {};
  let n = 0;
  for (let si = 0; si < ex.sets; si++){
    if (day.sets[wk][ei][si]?.done) continue;
    const ref = lastEntry(wk, ei, si, S.currentGym) || lastEntry(wk, ei, si, null);
    if (!ref) continue;
    day.sets[wk][ei][si] = {w: ref.w, r: ref.r, done: true, pr: false, ts: Date.now()};
    n++;
  }
  if (!n) return toast("No previous session to copy");
  persist(); render();
  toast(`${n} set${n > 1 ? 's' : ''} logged — match last session`, null, "check");
}

// ─── finish sheet ───
function openFinishSheet(wk){
  const tk = todayKey();
  const done = setsDoneCount(tk, wk), total = totalSets(wk);
  openSheet(`
    <div class="sheet-hd"><div><div class="sheet-ovl">${done}/${total} sets · ${dayVolume(tk).toLocaleString("en-IN")} kg total</div>
      <div class="sheet-t">Finish ${W[wk].label}?</div></div>
      <button class="sheet-x" onclick="closeSheet()" aria-label="Close">${ic('x',12)}</button></div>
    <div class="lbl">Session note (optional)</div>
    <input class="inp" id="finNote" placeholder="Energy, pain, machine quirks…" value="${esc(S.days[tk]?.note || "")}">

    <button class="bbt" onclick="finishWorkout('${wk}')">${ic('check',16)} ${done >= total ? "Finish — full session" : "Finish — partial session"}</button>`);
}
function finishWorkout(wk){
  const tk = todayKey();
  const day = ensureDay(tk);
  const note = document.getElementById("finNote");
  if (note && note.value.trim()) day.note = note.value.trim();
  const due = dueList(tk);
  const allTouched = due.every(d => setsDoneCount(tk, d) > 0);
  if (due.length <= 1 || allTouched){
    let logged = 0, total = 0;
    for (const d of due.length ? due : [wk]){ logged += setsDoneCount(tk, d); total += totalSets(d); }
    day.status = (total > 0 && logged >= total) ? "done" : "partial";
  }
  persist(); closeSheet(); stopTimer();
  setTab("today");
  toast(day.status === "done" ? "Session done — strong work" : "Session saved", "accent", "trophy");
}

function adherenceStats(nDays){
  const t = todayKey();
  let trained = 0, missedC = 0, skippedC = 0, pushedC = 0;
  for (let i = 0; i < nDays; i++){
    const k = addDays(t, -i);
    if (!dueList(k).length && !anyTrainingLogged(k)) continue;
    const c = dayStatus(k).code;
    if (c === "done" || c === "partial") trained++;
    else if (c === "missed") missedC++;
    else if (c === "skipped") skippedC++;
    else if (c === "pushed") pushedC++;
  }
  const denom = trained + missedC + skippedC;
  return {trained, missed: missedC, skipped: skippedC, pushed: pushedC,
    pct: denom ? Math.round(trained / denom * 100) : 100};
}
function currentStreak(){
  let streak = 0;
  for (let i = 0; i < 120; i++){
    const k = addDays(todayKey(), -i);
    const c = dayStatus(k).code;
    if (c === "done" || c === "partial"){ streak++; continue; }
    if (c === "rest" || c === "pushed" || (i === 0 && c === "none")) continue;
    break;
  }
  return streak;
}
function weekVolume(){
  let v = 0;
  for (let i = 0; i < 7; i++) v += dayVolume(addDays(todayKey(), -i));
  return v;
}

function heatStrip(){
  const t = todayKey();
  const mon = addDays(t, -weekdayIdx(t));
  let cells = "";
  for (let w = 7; w >= 0; w--){
    for (let d = 0; d < 7; d++){
      const k = addDays(mon, -w * 7 + d);
      const c = dayStatus(k).code;
      const cls = (c === "done" || c === "partial" || c === "missed" || c === "skipped") ? c : "";
      cells += `<div class="heat-cell ${cls}${k === t ? ' today' : ''}" title="${fmtDate(k,{weekday:"short",day:"numeric",month:"short"})} · ${STATUS_LABEL[c] || "—"}"></div>`;
    }
  }
  return `<div class="heat">${cells}</div>
    <div class="heat-lg">
      <span><i style="background:rgba(48,209,88,0.6)"></i>done</span>
      <span><i style="background:rgba(255,214,10,0.45)"></i>partial</span>
      <span><i style="background:rgba(255,69,58,0.42)"></i>missed</span>
      <span><i style="background:rgba(152,152,157,0.3)"></i>skipped</span>
    </div>`;
}

// top logged set weight per session for one exercise
function exerciseSeries(wk, ei, gymId){
  const out = [];
  for (const k of Object.keys(S.days).sort()){
    if (gymId && dayGym(k) !== gymId) continue;
    const e = S.days[k].sets?.[wk]?.[ei]; if (!e) continue;
    let top = null;
    for (const s of Object.values(e)) if (s && s.done && (!top || s.w > top)) top = s.w;
    if (top != null) out.push({label: fmtDate(k), v: top});
  }
  return out.slice(-15);
}
function allWeightSeries(nDays){
  const cut = addDays(todayKey(), -nDays);
  return [...S.weights].filter(w => w.date >= cut).sort((a,b) => a.date < b.date ? -1 : 1)
    .map(w => ({label: fmtDate(w.date), v: w.kg}));
}

function renameGym(id){
  const g = S.gyms.find(g => g.id === id);
  if (!g) return;
  const n = prompt("Rename gym", g.name);
  if (!n || !n.trim()) return;
  g.name = n.trim().slice(0, 40);
  persist(); render();
}
function deleteGym(id){
  if (S.gyms.length <= 1) return toast("You need at least one gym");
  const used = Object.values(S.days).some(d => d.gym === id);
  if (used) return toast("This gym has logged history — rename it instead");
  if (!confirm("Delete " + gymName(id) + "?")) return;
  S.gyms = S.gyms.filter(g => g.id !== id);
  if (S.currentGym === id) S.currentGym = S.gyms[0].id;
  persist(); render();
}

// ─── Excel export ───
function exportXlsx(){
  try {
    const dates = Object.keys(S.days).sort();
    const sessions = [["Date","Day","Workout","Status","Gym","Sets done","Volume (kg)","Note"]];
    for (const k of dates){
      const due = dueList(k);
      const names = due.length ? due.map(w => W[w].label).join(" + ") : (anyTrainingLogged(k) ? "Extra session" : "Rest");
      const st = dayStatus(k).code;
      if (st === "rest" && !anyTrainingLogged(k) && !S.days[k].note) continue;
      let setsDone = 0;
      for (const wk of Object.keys(S.days[k].sets || {})) setsDone += setsDoneCount(k, wk);
      sessions.push([k, SCHED[weekdayIdx(k)].day, names, st, gymName(dayGym(k)), setsDone, dayVolume(k), S.days[k].note || ""]);
    }
    const sets = [["Date","Workout","Exercise","Set","Weight (kg)","Reps","PR","Gym"]];
    for (const k of dates){
      const by = S.days[k].sets || {};
      for (const wk of Object.keys(by)){
        if (!W[wk]) continue;
        for (const ei of Object.keys(by[wk]).sort((a,b) => a - b)){
          const ex = W[wk].exercises[ei]; if (!ex) continue;
          for (const si of Object.keys(by[wk][ei]).sort((a,b) => a - b)){
            const s = by[wk][ei][si];
            if (s && s.done) sets.push([k, W[wk].label, ex.name, +si + 1, s.w, s.r, s.pr ? "PR" : "", gymName(dayGym(k))]);
          }
        }
      }
    }
    const bw = [["Date","Kg"]];
    [...S.weights].sort((a,b) => a.date < b.date ? -1 : 1).forEach(w => bw.push([w.date, w.kg]));
    const prs = [["Exercise","Gym","Weight (kg)","Reps","Date"]];
    for (const wk of Object.keys(W)) W[wk].exercises.forEach((ex, ei) => {
      for (const g of S.gyms){
        const b = bestAt(wk, ei, g.id);
        if (b) prs.push([ex.name, g.name, b.w, b.r, b.date]);
      }
    });
    const prog = [["Workout","Exercise","Sets","Reps","Rest (s)","Muscles"]];
    for (const wk of Object.keys(W)) W[wk].exercises.forEach(ex => prog.push([W[wk].label, ex.name, ex.sets, ex.reps, ex.rest, ex.muscle]));

    downloadBlob(buildXlsx([
      {name: "Sessions", rows: sessions},
      {name: "Sets", rows: sets},
      {name: "BodyWeight", rows: bw},
      {name: "PRs", rows: prs},
      {name: "Program", rows: prog}
    ]), "naren-workout.xlsx");
    toast("Workbook downloaded", null, "check");
  } catch(e){ console.error(e); toast("Export failed — see console"); }
}

// ─── JSON backup ───
function exportJson(){
  const out = {};
  PERSISTED.forEach(p => out[p] = S[p]);
  downloadBlob(new Blob([JSON.stringify(out)], {type: "application/json"}), "train-backup-" + todayKey() + ".json");
  toast("Backup downloaded", null, "check");
}
document.getElementById("importInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (d && d.version === 6 && typeof d.days === "object"){ applyState(d); }
      else if (d && d.log){ applyState(migrateV5(d)); }        // accept a v5 backup too
      else throw new Error("unrecognised backup shape");
      persist(); render();
      toast("Backup imported", "accent", "check");
    } catch(err){ console.error(err); toast("That file isn't a valid backup — nothing changed"); }
    e.target.value = "";
  };
  r.readAsText(file);
});

function resetAll(){
  if (!confirm("Reset ALL v6 workout data on this device?")) return;
  if (!confirm("Really sure? This cannot be undone.")) return;
  localStorage.removeItem(KEY_V6);
  location.reload();
}

// ─── AI coach report ───
function buildAIPrompt(){
  const t = todayKey();
  const a = adherenceStats(28);
  const L = [];
  L.push("Act as my personal strength coach. Below is my full training log export from my workout tracker. Analyse it and tell me: (1) which lifts are progressing and which have stalled, (2) exactly what to change next week — sets, reps, weights or exercise swaps, (3) whether my adherence pattern suggests changing my schedule, (4) anything concerning. Ask me questions if you need missing context.");
  L.push("");
  const wt = [...S.weights].sort((a,b) => a.date < b.date ? -1 : 1);
  const latest = wt[wt.length - 1];
  const monthAgoW = wt.filter(w => w.date <= addDays(t, -25)).pop();
  const delta = latest && monthAgoW ? (latest.kg - monthAgoW.kg).toFixed(1) : null;
  L.push(`PROFILE: bodyweight ${latest ? latest.kg + "kg" : "not logged"}${delta ? ` (${delta > 0 ? "+" : ""}${delta}kg over ~30 days)` : ""}. Program: Upper/Lower 4-day split — Mon Upper 1, Tue Lower 1, Thu Upper 2, Fri Lower 2. Rest: Wed/Sat/Sun.`);
  L.push(`GYMS: ${S.gyms.map(g => g.name).join(", ")}. Note: the same machine can load differently across gyms, so compare weights within one gym.`);
  L.push(`ADHERENCE (last 4 weeks): ${a.trained} sessions trained, ${a.missed} missed, ${a.skipped} deliberately skipped, ${a.pushed} pushed to another day. Adherence ${a.pct}%.`);
  if (wt.length) L.push("BODYWEIGHT (last 10): " + wt.slice(-10).map(w => `${w.date} ${w.kg}kg`).join(", "));
  L.push("");
  L.push("PER-EXERCISE PROGRESSION (top set per session, last 4 weeks, grouped by gym):");
  const cut = addDays(t, -28);
  let anyProg = false;
  for (const wk of Object.keys(W)) W[wk].exercises.forEach((ex, ei) => {
    for (const g of S.gyms){
      const pts = [];
      for (const k of Object.keys(S.days).sort()){
        if (k < cut || dayGym(k) !== g.id) continue;
        const e = S.days[k].sets?.[wk]?.[ei]; if (!e) continue;
        let top = null;
        for (const s of Object.values(e)) if (s && s.done && (!top || s.w > top.w)) top = s;
        if (top) pts.push({k, w: top.w, r: top.r});
      }
      if (pts.length < 1) continue;
      anyProg = true;
      const f = pts[0], l = pts[pts.length - 1];
      const pct = f.w ? Math.round((l.w - f.w) / f.w * 1000) / 10 : 0;
      const flat = pts.length >= 3 && Math.abs(pct) < 2.5 ? " [PLATEAU?]" : "";
      L.push(`- ${ex.name} @ ${g.name}: ${f.w}kg×${f.r} (${f.k}) -> ${l.w}kg×${l.r} (${l.k}), ${pts.length} sessions, ${pct > 0 ? "+" : ""}${pct}%${flat}`);
    }
  });
  if (!anyProg) L.push("- (no sets logged in the last 4 weeks)");
  L.push("");
  L.push("PERSONAL RECORDS:");
  let anyPR = false;
  for (const wk of Object.keys(W)) W[wk].exercises.forEach((ex, ei) => {
    for (const g of S.gyms){
      const b = bestAt(wk, ei, g.id);
      if (b){ anyPR = true; L.push(`- ${ex.name}: ${b.w}kg × ${b.r} @ ${g.name} (${b.date})`); }
    }
  });
  if (!anyPR) L.push("- none yet");
  const notes = Object.entries(S.exNotes).map(([n, v]) => `- ${n}: ${v}`);
  const dayNotes = Object.keys(S.days).sort().filter(k => k >= cut && S.days[k].note).map(k => `- ${k}: ${S.days[k].note}`);
  if (notes.length || dayNotes.length){
    L.push("");
    L.push("MY NOTES:");
    L.push(...notes, ...dayNotes);
  }
  return L.join("\n");
}
function openAISheet(){
  const p = buildAIPrompt();
  openSheet(`
    <div class="sheet-hd"><div><div class="sheet-ovl">${p.length.toLocaleString("en-IN")} characters</div>
      <div class="sheet-t">Coach report</div></div>
      <button class="sheet-x" onclick="closeSheet()" aria-label="Close">${ic('x',12)}</button></div>
    <textarea id="aiPrompt" class="inp" readonly style="height:180px;padding:12px;font-size:12px;line-height:1.5;resize:none">${esc(p)}</textarea>
    <div style="height:12px"></div>
    <button class="bbt" onclick="copyAIPrompt()">${ic('copy',15)} Copy — paste into your AI</button>
    <div class="btnrow" style="margin-top:8px">
      ${navigator.share ? `<button class="btn sm" onclick="shareAIPrompt()">${ic('share',14)} Share</button>` : ""}
      <button class="btn sm" onclick="downloadAIPrompt()">${ic('download',14)} Save .md</button>
    </div>`);
}
async function copyAIPrompt(){
  const p = document.getElementById("aiPrompt").value;
  try { await navigator.clipboard.writeText(p); toast("Copied — paste it to your AI coach", "accent", "check"); }
  catch(e){
    const ta = document.getElementById("aiPrompt");
    ta.focus(); ta.select();
    toast(document.execCommand("copy") ? "Copied" : "Copy failed — use Save .md");
  }
}
function shareAIPrompt(){
  navigator.share({title: "My training report", text: document.getElementById("aiPrompt").value}).catch(() => {});
}
function downloadAIPrompt(){
  downloadBlob(new Blob([document.getElementById("aiPrompt").value], {type: "text/markdown"}), "coach-report-" + todayKey() + ".md");
}

}
